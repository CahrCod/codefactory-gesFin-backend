version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gestion-financiera-db
    environment:
      POSTGRES_DB: prueba_reservas_db
      POSTGRES_USER: prueba_user
      POSTGRES_PASSWORD: prueba_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prueba_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestion-financiera-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/prueba_reservas_db
      SPRING_DATASOURCE_USERNAME: prueba_user
      SPRING_DATASOURCE_PASSWORD: prueba_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network
    restart: unless-stopped

networks:
  backend-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
